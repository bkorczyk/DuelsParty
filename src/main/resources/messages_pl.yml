  duel.death.1: "&6&l» &f{victim} &7zaliczył glebę. &f{killer} &7wysłał go na przedwczesną drzemkę!"
  duel.death.2: "&6&l» &7Potężne L dla gracza &f{victim}&7. &f{killer} &7jest po prostu zbudowany inaczej."
  duel.death.3: "&6&l» &7Ups! &f{victim} &7zapomniał, jak się klika. &f{killer} &7wyjaśnił go w sekundę."
  duel.death.4: "&6&l» &f{victim} &7właśnie odinstalował życie. Sprawca: &f{killer}&7."
  duel.death.5: "&6&l» &7Czy to ptak? Czy to samolot? Nie, to &f{victim} &7lecący na spawn dzięki &f{killer}owi&7!"
  duel.death.6: "&6&l» &f{killer} &7właśnie wbił &f{victim}owi &7takiego hita, że aż mu ping skoczył."
  duel.death.7: "&6&l» &7Ktoś tu ma skill issue... &f{victim} &7pada, &f{killer} &7triumfuje."
  duel.death.8: "&6&l» &f{victim} &7wszedł w tryb obserwatora na stałe. &f{killer} &7nie miał litości."
  duel.death.9: "&6&l» &7POV: Jesteś &f{victim}em &7i właśnie przegrałeś z szefem &f{killer}em&7."
  duel.death.10: "&6&l» &7Ej &f{victim}&7, &f{killer} &7prosił przekazać, że Twoje uniki nie działają."
  duel.death.11: "&6&l» &f{killer} &7właśnie wysłał &f{victim}a &7do lobby po frytki."
  duel.death.12: "&6&l» &7Mamy tu kogoś, kto zapomniał wypić potkę na skilla. &f{victim} &7< &f{killer}&7."
  duel.death.13: "&6&l» &f{victim} &7miał lagi? Nie, &f{killer} &7po prostu jest za szybki."
  duel.death.14: "&6&l» &7Bilet w jedną stronę na spawn dla &f{victim}a &7wystawiony przez &f{killer}a&7!"
  duel.death.15: "&6&l» &7Klawiatura &f{victim}a &7płacze, a &f{killer} &7się śmieje."
  duel.death.16: "&6&l» &7Współczujemy &f{victim}owi&7. &f{killer} &7właśnie zrobił mu darmową lekcję PvP."
  duel.death.17: "&6&l» &7Ktoś tu chyba gra na touchpadzie... &f{victim} &7pada pod nogi &f{killer}a&7."
  duel.death.18: "&6&l» &7Nie płacz &f{victim}&7, &f{killer} &7po prostu zjadł dziś lepsze śniadanie."
  duel.death.19: "&6&l» &f{victim} &7został zmieciony z planszy. Pogromca: &f{killer}&7."
  duel.death.20: "&6&l» &7Legenda głosi, że &f{victim} &7do teraz szuka swoich itemów. &f{killer} &7GG!"